version: "3.8"

services:
  ecom-product-api:
    image: node:25.3
    container_name: ecom-product-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - SERVICE_NAME=ecom-product-api
    stdin_open: true
    tty: true
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:v10
    container_name: dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
